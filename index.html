<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Boutique</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:linear-gradient(180deg,#fff0f5,#ffffff);
}

header{
background:linear-gradient(135deg,#ff4d88,#ff77aa);
color:white;
padding:28px;
text-align:center;
font-size:26px;
font-weight:700;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:10px;
}

.menu button{
background:white;
border:1px solid #ff4d88;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
font-weight:600;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
padding:20px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{margin:10px;}
.card p{margin:0 10px;font-size:13px;color:#666;}
.card b{display:block;margin:10px;color:#ff4d88;font-weight:700;}

button.add{
background:#ff4d88;
color:white;
border:none;
padding:10px;
margin:10px;
width:calc(100% - 20px);
border-radius:12px;
cursor:pointer;
}

#cart{
position:fixed;
right:15px;
top:90px;
width:260px;
background:white;
padding:15px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

#total{color:#ff4d88;font-weight:700;}
</style>
</head>

<body>

<header>🌸 Flower Boutique Premium</header>

<div class="menu">
<button onclick="filter('all')">🌸 Всё</button>
<button onclick="filter('bouquets')">🌹 Букеты</button>
<button onclick="filter('strawberry')">🍓 Клубника</button>
<button onclick="filter('balloons')">🎈 Шары</button>
<button onclick="filter('toys')">🧸 Игрушки</button>
</div>

<div id="products"></div>

<div id="cart">
<h3>🛒 Корзина</h3>
<div id="cartItems"></div>
<p>Итого: <span id="total">0</span> ₽</p>
<button onclick="order()">💬 WhatsApp</button>
</div>

<script>

let products = [
{name:"Розы премиум",desc:"Элегантный букет",price:4500,category:"bouquets",img:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"},
{name:"Белый букет",desc:"Нежные цветы",price:3900,category:"bouquets",img:"https://images.unsplash.com/photo-1520763185298-1b434c919102"},
{name:"Клубника в шоколаде",desc:"Подарочный набор",price:2800,category:"strawberry",img:"https://images.unsplash.com/photo-1519869325930-281384150729"},
{name:"Шары с надписью",desc:"Индивидуальный текст",price:1900,category:"balloons",img:"https://images.unsplash.com/photo-1520975922284-7c2f1c1a8d63"},
{name:"Мягкие игрушки",desc:"Плюшевые подарки",price:2500,category:"toys",img:"https://images.unsplash.com/photo-1583337130417-3346a1be7dee"}
];

let cart=[];

function render(list){
let box=document.getElementById("products");
box.innerHTML="";
list.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<b>${p.price} ₽</b>
<button class="add" onclick="add(${i})">В корзину</button>
</div>`;
});
}

function filter(cat){
if(cat==="all") render(products);
else render(products.filter(p=>p.category===cat));
}

function add(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(p=>{
box.innerHTML+=`<div>${p.name} - ${p.price}₽</div>`;
total+=p.price;
});

document.getElementById("total").innerText=total;
}

function order(){
let text="🌸 Заказ:%0A";

cart.forEach(p=>{
text+=`- ${p.name} (${p.price}₽)%0A`;
});

let total=cart.reduce((s,p)=>s+p.price,0);
text+=`%0A💰 Итого: ${total}₽`;

window.open("https://wa.me/79280126881?text="+text,"_blank");
}

filter("all");

</script>

</body>
</html>
