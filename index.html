<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Магия Цветов — Каталог</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #fff9fa; color: #333; }
        header { background-color: #d63384; color: white; text-align: center; padding: 20px 10px; }
        h1 { margin: 0; font-size: 24px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        /* Выбор города */
        .city-box { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 12px 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .city-box label { font-weight: bold; color: #d63384; }
        .city-box select { padding: 6px 12px; border: 1px solid #d63384; border-radius: 8px; color: #333; outline: none; font-size: 14px; background-color: #fff9fa; cursor: pointer; font-weight: bold; }

        /* Галерея товаров - ДВА РЯДА */
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; justify-items: center; max-width: 600px; margin: 0 auto 25px; }
        .product-card { background: white; border: 1px solid #ffccd5; border-radius: 12px; width: 100%; max-width: 280px; padding: 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.12); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background-color: #fff0f2; }
        .product-title { font-size: 14px; font-weight: bold; margin: 8px 0 4px 0; text-align: center; color: #333; }
        .product-description { font-size: 12px; color: #666; margin: 4px 0 8px 0; text-align: center; line-height: 1.4; min-height: 36px; }
        .product-price { color: #d63384; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .add-to-cart-btn { background-color: #d63384; color: white; border: none; padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; width: 100%; font-weight: bold; transition: background-color 0.2s; }
        .add-to-cart-btn:hover { background-color: #a82860; }
        
        /* Дополнительные услуги */
        .extra-services-section { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 15px; margin: 25px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .extra-services-section h2 { color: #d63384; font-size: 18px; margin-top: 0; margin-bottom: 5px; }
        .extra-main-note { font-size: 12px; color: #888; font-style: italic; margin-bottom: 15px; }
        .extra-option { display: flex; align-items: center; gap: 10px; font-size: 15px; cursor: pointer; margin-bottom: 8px; padding: 4px 0; }
        .extra-option input { width: 18px; height: 18px; accent-color: #d63384; }
        
        /* Интерактивная Корзина */
        .cart-section { background: white; border: 2px solid #25D366; border-radius: 12px; padding: 15px; margin: 25px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cart-section h2 { margin-top: 0; color: #25D366; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .cart-items { margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .cart-total { font-weight: bold; text-align: right; margin-bottom: 15px; font-size: 18px; color: #d63384; }
        .whatsapp-btn { background-color: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; transition: background-color 0.2s; }
        .whatsapp-btn:hover { background-color: #1f9d4f; }

        /* Адаптивность */
        @media (max-width: 768px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .product-card { max-width: 100%; }
            .product-card img { height: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🌸 Цветочная мастерская</h1>
    </header>

    <div class="container">
        
        <div class="city-box">
            <label for="city-select">📍 Выберите город доставки:</label>
            <select id="city-select">
                <option value="Москва">Москва</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
                <option value="Краснодар">Краснодар</option>
                <option value="Екатеринбург">Екатеринбург</option>
                <option value="Другой город">Другой город</option>
            </select>
        </div>

        <div class="gallery" id="gallery"></div>

        <div class="extra-services-section">
            <h2>🎁 Добавить к букету</h2>
            <div class="extra-main-note">Дополнительные услуги согласовываются с флористом при заказе</div>
            
            <label class="extra-option">
                <input type="checkbox" id="extra-candy">
                <span>🍬 Коробка вкусных конфет (150 г) — +200 руб.</span>
            </label>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 4px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-strawberries">
                <span>🍓 Клубника в шоколаде (200 г) — +250 руб.</span>
            </label>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 4px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-toy">
                <span>🧸 Мягкая игрушка (20 см) — +180 руб.</span>
            </label>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 4px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-card">
                <span>💌 Открытка с пожеланием — +50 руб.</span>
            </label>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 4px 0;">

            <label class="extra-option">
                <input type="checkbox" id="extra-balloons">
                <span>🎈 Гелевые шарики с надписью (3 шт.) — +150 руб.</span>
            </label>
            <hr style="border: 0; border-top: 1px solid #fff0f2; margin: 4px 0;">

            <label class="extra-option" style="margin-top: 8px;">
                <input type="checkbox" id="extra-combo">
                <span>🧺 VIP-набор: Букет + Конфеты + Шарики — +350 руб.</span>
            </label>
        </div>

        <div class="cart-section">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items" class="cart-items">
                <p style="color: #888; font-style: italic; margin: 0;">Корзина пуста. Добавьте букеты!</p>
            </div>
            <div class="cart-total" id="cart-total">Итого: 0 руб.</div>
            <a href="#" class="whatsapp-btn" onclick="sendOrder(event)">Оформить заказ в WhatsApp</a>
        </div>
    </div>

    <script>
        const myPhoneNumber = "79280126881"; 

        // Ваши загруженные фотографии
        const uploadedPhotos = [
            "PHOTO-2025-06-07-00-47-47.jpeg",
            "PHOTO-2025-06-07-00-54-49.jpeg",
            "PHOTO-2025-06-07-01-03-23.jpeg",
            "PHOTO-2025-06-26-23-37-17.jpeg",
            "PHOTO-2025-06-26-23-37-26.jpeg",
            "PHOTO-2025-06-29-01-24-00 5.jpeg",
            "PHOTO-2025-06-29-01-24-00 6.jpeg",
            "PHOTO-2025-06-29-01-24-00 7.jpeg",
            "PHOTO-2025-06-29-01-24-01 2.jpeg",
            "PHOTO-2025-06-29-01-24-01 3.jpeg",
            "PHOTO-2025-06-29-01-24-01 4.jpeg",
            "PHOTO-2025-06-29-01-24-01.jpeg",
            "PHOTO-2025-06-29-16-03-20.jpeg",
            "PHOTO-2025-06-29-16-04-06.jpeg",
            "PHOTO-2025-06-29-16-26-51.jpeg",
            "PHOTO-2025-06-29-16-55-32.jpeg",
            "PHOTO-2025-06-29-16-56-11.jpeg",
            "PHOTO-2025-06-29-16-58-52.jpeg",
            "PHOTO-2025-06-29-17-05-25.jpeg",
            "PHOTO-2025-07-06-21-46-41.jpeg",
            "PHOTO-2025-07-06-22-14-19.jpeg",
            "PHOTO-2025-07-06-22-16-25.jpeg",
            "PHOTO-2025-07-06-22-17-39.jpeg",
            "PHOTO-2025-07-08-18-00-15.jpeg",
            "PHOTO-2025-07-12-21-35-36.jpeg",
            "PHOTO-2025-07-13-17-43-49 2.jpeg",
            "PHOTO-2025-07-13-17-43-49 3.jpeg",
            "PHOTO-2025-07-13-17-43-49 4.jpeg",
            "PHOTO-2025-07-13-18-29-54 2.jpeg",
            "PHOTO-2025-07-13-18-29-54.jpeg",
            "PHOTO-2025-07-13-21-46-44 2.jpeg",
            "PHOTO-2025-07-13-21-46-44 3.jpeg",
            "PHOTO-2025-07-13-21-46-44 4.jpeg",
            "PHOTO-2025-07-13-21-46-44 5.jpeg",
            "PHOTO-2025-07-13-21-46-44.jpeg",
            "PHOTO-2025-07-13-21-47-25.jpeg",
            "PHOTO-2025-07-16-15-25-04 2.jpeg",
            "PHOTO-2025-07-16-15-25-04.jpeg",
            "jessie-daniella-QLuleNy8LMM-unsplash.jpeg"
        ];

        // Реалистичные описания букетов
        const descriptions = [
            "Нежный букет из свежих роз и гипсофилы. Идеален для выражения чувств и романтических моментов.",
            "Яркая композиция из тюльпанов и альстромерий. Поднимает настроение и дарит позитивные эмоции.",
            "Элегантный букет с белыми и розовыми пионами. Подходит для торжественных случаев и праздников.",
            "Солнечный букет из подсолнухов и зелени. Символ тепла, оптимизма и благодарности.",
            "Утончённая композиция с премиум-розами и эвкалиптом. Для особых людей и важных моментов.",
            "Весенний букет из нежных гвоздик и гипсофилы. Универсален для любого праздника.",
            "Экзотический букет из орхидей и зелени. С��ильный и неповторимый подарок.",
            "Романтичный букет с красными розами и ягодами. Выражает глубину чувств и страсть.",
            "Нежный букет с персиковыми розами и белыми цветами. Символизирует нежность и заботу.",
            "Яркий букет из астр и герберы. Радостный и энергичный подарок для близких людей."
        ];

        // Генерируем каталог с оптимальными ценами
        const products = [];
        const baseUrl = "https://raw.githubusercontent.com/6nwbbbwhpz-lgtm/----/main/";
        
        const priceOptions = [650, 750, 850, 950, 1050, 1150, 1250, 1300, 700, 800, 900, 1000, 1100, 1200];
        
        for (let i = 1; i <= 40; i++) {
            let defaultPrice = priceOptions[i % priceOptions.length];
            let fileName = uploadedPhotos[i % uploadedPhotos.length];
            let fullUrl = baseUrl + encodeURI(fileName);
            let description = descriptions[i % descriptions.length];

            products.push({
                id: i,
                name: `Букет №${i}`,
                price: defaultPrice,
                url: fullUrl,
                description: description
            });
        }

        let cart = [];

        // Вывод карточек на экран
        const galleryEl = document.getElementById('gallery');
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.url}" alt="${prod.name}" onerror="this.src='https://placehold.co/280x200/fff0f2/d63384?text=Букет'">
                <div class="product-title">${prod.name}</div>
                <div class="product-description">${prod.description}</div>
                <div class="product-price">${prod.price} руб.</div>
                <button class="add-to-cart-btn" onclick="addToCart(${prod.id})">В корзину</button>
            `;
            galleryEl.appendChild(card);
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.count++; } else { cart.push({ ...product, count: 1 }); }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsEl = document.getElementById('cart-items');
            const cartTotalEl = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<p style="color: #888; font-style: italic; margin: 0;">Корзина пуста.</p>';
                cartTotalEl.innerText = 'Итого: 0 руб.';
                return;
            }
            cartItemsEl.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.count;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>🌸 ${item.name} (x${item.count})</span><span>${item.price * item.count} руб.</span>`;
                cartItemsEl.appendChild(div);
            });
            cartTotalEl.innerText = `Итого: ${total} руб.`;
        }

        function sendOrder(e) {
            e.preventDefault();
            const selectedCity = document.getElementById('city-select').value;
            
            // Сбор данных о дополнительных товарах
            const candySelected = document.getElementById('extra-candy').checked;
            const strawberriesSelected = document.getElementById('extra-strawberries').checked;
            const toySelected = document.getElementById('extra-toy').checked;
            const cardSelected = document.getElementById('extra-card').checked;
            const balloonsSelected = document.getElementById('extra-balloons').checked;
            const comboSelected = document.getElementById('extra-combo').checked;

            if (cart.length === 0 && !candySelected && !strawberriesSelected && !toySelected && !cardSelected && !balloonsSelected && !comboSelected) {
                alert('Пожалуйста, выберите товар!');
                return;
            }

            let message = `Здравствуйте! Мой заказ:\n📍 *Город доставки:* ${selectedCity}\n\n`;
            let total = 0;

            if (cart.length > 0) {
                message += '*Выбранные букеты:*\n';
                cart.forEach(item => {
                    message += `• ${item.name} — ${item.count} шт. (${item.price * item.count} руб.)\n`;
                    total += item.price * item.count;
                });
                message += `\n*Итого за букеты: ${total} руб.*\n`;
            }

            let hasExtras = false;
            let extrasText = '\n🎁 *Дополнительно к заказу:*\n';
            let extrasTotal = 0;
            
            if (candySelected) { extrasText += '• Коробка конфет (150 г) 🍬 — +200 руб.\n'; hasExtras = true; extrasTotal += 200; }
            if (strawberriesSelected) { extrasText += '• Клубника в шоколаде (200 г) 🍓 — +250 руб.\n'; hasExtras = true; extrasTotal += 250; }
            if (toySelected) { extrasText += '• Мягкая игрушка (20 см) 🧸 — +180 руб.\n'; hasExtras = true; extrasTotal += 180; }
            if (cardSelected) { extrasText += '• Открытка с пожеланием 💌 — +50 руб.\n'; hasExtras = true; extrasTotal += 50; }
            if (balloonsSelected) { extrasText += '• Гелевые шарики с надписью (3 шт.) 🎈 — +150 руб.\n'; hasExtras = true; extrasTotal += 150; }
            if (comboSelected) { extrasText += '• VIP-набор: Букет + Конфеты + Шарики 🧺 — +350 руб.\n'; hasExtras = true; extrasTotal += 350; }

            if (hasExtras) {
                message += extrasText;
                total += extrasTotal;
                message += `*Итого с дополнениями: ${total} руб.*\n`;
            }

            message += '\n💳 Ожидаю подтверждения и деталей доставки.';

            window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
