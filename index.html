<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flower Shop Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background: radial-gradient(circle at top, #ffe4ec, #fff);
color:#222;
}

/* HEADER */
header{
background: linear-gradient(135deg,#ff4d88,#ff77aa);
color:white;
padding:25px;
text-align:center;
font-size:26px;
font-weight:700;
}

/* GRID */
#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.card{
background: rgba(255,255,255,0.75);
backdrop-filter: blur(10px);
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
margin:0 10px;
font-size:13px;
color:#666;
}

.card b{
display:block;
margin:10px;
color:#ff4d88;
font-weight:700;
}

/* BUTTON */
button{
background: linear-gradient(135deg,#ff4d88,#ff2e70);
color:white;
border:none;
padding:10px;
margin:10px;
width:calc(100% - 20px);
border-radius:12px;
cursor:pointer;
font-weight:600;
}

/* CART */
#cart{
position:fixed;
right:15px;
top:90px;
width:250px;
background: rgba(255,255,255,0.85);
backdrop-filter: blur(10px);
padding:15px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

#total{
color:#ff4d88;
font-size:18px;
font-weight:700;
}

/* WHATSAPP */
.wa{
background: linear-gradient(135deg,#25D366,#1ebe5d);
}
</style>
</head>

<body>

<header>🌸 Flower Shop Premium</header>

<div id="products"></div>

<div id="cart">
<h3>🛒 Корзина</h3>
<div id="cartItems"></div>
<p>Итого: <span id="total">0</span> €</p>

<input id="name" placeholder="Имя">
<input id="phone" placeholder="Телефон">

<button onclick="orderWhatsApp()" class="wa">
💬 Заказать в WhatsApp
</button>
</div>

<script>

/* 🌸 ТОВАРЫ */
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Розы",price:25,desc:"Красные розы",img:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"},
{name:"Тюльпаны",price:18,desc:"Весенний букет",img:"https://images.unsplash.com/photo-1520763185298-1b434c919102"},
{name:"Лилии",price:30,desc:"Белые лилии",img:"https://images.unsplash.com/photo-1561181286-d3fee7d55364"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* 🌸 РЕНДЕР */
function render(){

let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<b>${p.price} €</b>
<button onclick="add(${i})">В корзину</button>
</div>
`;
});

renderCart();
}

/* 🛒 ADD */
function add(i){

let item = products[i];
let found = cart.find(x=>x.name===item.name);

if(found){
found.qty++;
}else{
cart.push({...item,qty:1});
}

save();
renderCart();
}

/* 💾 SAVE */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("products",JSON.stringify(products));
}

/* 🛒 CART */
function renderCart(){

let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(p=>{
box.innerHTML+=`<div>${p.name} x${p.qty}</div>`;
total += p.price * p.qty;
});

document.getElementById("total").innerText=total;
}

/* 📲 WHATSAPP ORDER */
function orderWhatsApp(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

let text="🌸 Заказ:%0A";

cart.forEach(p=>{
text+=`- ${p.name} x${p.qty}%0A`;
});

let total = cart.reduce((s,p)=>s+p.price*p.qty,0);

text+=`%0AИмя: ${name}%0AТелефон: ${phone}%0AИтого: ${total}€`;

let url="https://wa.me/79280126881?text="+text;

window.open(url,"_blank");
}

/* START */
render();

</script>

</body>
</html>
